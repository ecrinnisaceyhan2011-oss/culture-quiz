<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nisa | Culture Quiz 🥨</title>
    <style>
        :root {
            --primary: #880e4f;
            --secondary: #ad1457;
            --bg-start: #fff5f8;
            --bg-end: #fce4ec;
        }

        body {
            margin: 0; padding: 0;
            /* Arka plan animasyonu */
            background: linear-gradient(-45deg, #fff5f8, #fce4ec, #f8bbd0, #e1f5fe);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .quiz-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(136, 14, 79, 0.15);
            text-align: center;
            width: 90%; max-width: 450px;
            transition: transform 0.3s ease;
        }

        h1 { color: var(--primary); margin-bottom: 5px; font-size: 26px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 25px; }

        .question { 
            font-size: 20px; color: #4e342e; font-weight: 600; 
            margin-bottom: 25px; min-height: 60px;
            display: flex; align-items: center; justify-content: center;
        }

        .options { display: grid; gap: 12px; }

        .btn {
            background: white; border: 2px solid #f8bbd0;
            padding: 15px; border-radius: 15px; cursor: pointer;
            font-weight: 600; color: var(--primary); 
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .btn:hover { 
            background: var(--primary); color: white; 
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(136, 14, 79, 0.2);
        }

        .btn:active { transform: translateY(0); }

        #score-area {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: center;
        }

        #score { font-weight: bold; color: var(--secondary); font-size: 18px; }
        #q-count { color: #999; font-size: 14px; }

        #feedback { 
            margin-top: 15px; font-weight: 700; font-size: 16px;
            height: 24px; transition: 0.3s;
        }

        .reset-btn { 
            margin-top: 20px; display: none; background: var(--primary); 
            color: white; border: none; padding: 12px 25px; 
            border-radius: 12px; cursor: pointer; font-weight: bold;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="quiz-card">
        <h1>Kültür Testi ✨</h1>
        <div class="subtitle">Bakalım Nisa ne kadar bilgili? 🥨</div>
        
        <div id="game">
            <div class="question" id="q-text">Hazır mısın?</div>
            <div class="options" id="options"></div>
        </div>

        <div id="feedback"></div>

        <div id="score-area">
            <div id="score">Puan: 0</div>
            <div id="q-count">Soru: 0/0</div>
        </div>
        
        <button id="reset" class="reset-btn" onclick="location.reload()">Baştan Başla 🔄</button>
    </div>

    <script>
        const data = [
            { q: "Simit en çok hangi şehirle özdeşleşir?", a: ["Ankara", "İzmir (Gevrek)", "İstanbul"], c: 0 },
            { q: "Mona Lisa tablosu hangi müzede sergilenmektedir?", a: ["British Museum", "Louvre", "Prado"], c: 1 },
            { q: "Dünyanın en yüksek dağı hangisidir?", a: ["K2", "Everest", "Lhotse"], c: 1 },
            { q: "Türk kahvesinin yanında genellikle ne ikram edilir?", a: ["Lokum", "Kraker", "Çikolata"], c: 0 },
            { q: "İstiklal Marşı'mızın şairi kimdir?", a: ["Ziya Gökalp", "Mehmet Akif Ersoy", "Namık Kemal"], c: 1 },
            { q: "Pisa Kulesi hangi ülkededir?", a: ["Fransa", "İspanya", "İtalya"], c: 2 },
            { q: "Hangi tatlı 'Sütlü' bir tatlıdır?", a: ["Baklava", "Sütlaç", "Revani"], c: 1 },
            { q: "Güneş sistemindeki en büyük gezegen hangisidir?", a: ["Satürn", "Mars", "Jüpiter"], c: 2 }
        ];

        let index = 0;
        let puan = 0;

        function render() {
            const qCount = document.getElementById('q-count');
            const feedback = document.getElementById('feedback');
            
            if (index >= data.length) {
                document.getElementById('game').innerHTML = `
                    <h2 style="color: var(--primary)">Bitti! 🎉</h2>
                    <p style="font-size: 18px; color: #555">Harika bir iş çıkardın Nisa!</p>
                `;
                document.getElementById('reset').style.display = "inline-block";
                feedback.innerText = "";
                qCount.innerText = `Toplam: ${data.length}/${data.length}`;
                return;
            }

            const item = data[index];
            document.getElementById('q-text').innerText = item.q;
            qCount.innerText = `Soru: ${index + 1}/${data.length}`;
            
            const ops = document.getElementById('options');
            ops.innerHTML = "";
            
            item.a.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "btn";
                b.innerText = opt;
                b.onclick = () => {
                    // Butonları devre dışı bırak (çift tıklamayı önlemek için)
                    const allBtns = document.querySelectorAll('.btn');
                    allBtns.forEach(btn => btn.style.pointerEvents = "none");

                    if(i === item.c) {
                        puan += 10;
                        feedback.innerText = "Harika! Doğru 🎉";
                        feedback.style.color = "#2e7d32";
                        b.style.background = "#c8e6c9";
                        b.style.borderColor = "#2e7d32";
                    } else {
                        feedback.innerText = "Üzgünüm, Yanlış! ❌";
                        feedback.style.color = "#c62828";
                        b.style.background = "#ffcdd2";
                        b.style.borderColor = "#c62828";
                    }

                    document.getElementById('score').innerText = "Puan: " + puan;
                    
                    setTimeout(() => {
                        feedback.innerText = "";
                        index++;
                        render();
                    }, 1200);
                };
                ops.appendChild(b);
            });
        }

        window.onload = render;
    </script>
</body>
</html>

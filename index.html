<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nisa | Culture Quiz 🥨</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #fff5f8;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .quiz-card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(248, 187, 208, 0.4);
            text-align: center;
            width: 90%; max-width: 400px;
        }
        h1 { color: #880e4f; margin-bottom: 20px; font-size: 22px; }
        .question { font-size: 18px; color: #5d4037; font-weight: 600; margin-bottom: 20px; }
        .options { display: grid; gap: 10px; }
        .btn {
            background: #fce4ec; border: 2px solid #f8bbd0;
            padding: 12px; border-radius: 12px; cursor: pointer;
            font-weight: 600; color: #880e4f; transition: 0.3s;
        }
        .btn:hover { background: #f8bbd0; transform: scale(1.02); }
        #score { margin-top: 20px; font-weight: bold; color: #ad1457; }
        #feedback { margin-top: 10px; height: 20px; font-weight: 600; }
        .reset-btn { margin-top: 15px; display: none; background: #880e4f; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="quiz-card">
        <h1>Kültür Testi 🥨</h1>
        <div id="game">
            <div class="question" id="q-text">Yükleniyor...</div>
            <div class="options" id="options"></div>
        </div>
        <div id="feedback"></div>
        <div id="score">Puan: 0</div>
        <button id="reset" class="reset-btn" onclick="location.reload()">Tekrar Dene 🔄</button>
    </div>

    <script>
        const data = [
            { q: "Simit en çok hangi şehirle özdeşleşir?", a: ["Ankara", "İzmir (Gevrek)", "İstanbul"], c: 1 },
            { q: "Türk kahvesinin yanında ne ikram edilir?", a: ["Lokum", "Bisküvi", "Çikolata"], c: 0 },
            { q: "Hangi tatlı 'Sütlü' bir tatlıdır?", a: ["Baklava", "Sütlaç", "Kübebe"], c: 1 }
        ];

        let index = 0;
        let puan = 0;

        function render() {
            if (index >= data.length) {
                document.getElementById('game').innerHTML = "<h2>Bitti! Harikasın Nisa ✨</h2>";
                document.getElementById('reset').style.display = "inline-block";
                return;
            }
            const item = data[index];
            document.getElementById('q-text').innerText = item.q;
            const ops = document.getElementById('options');
            ops.innerHTML = "";
            item.a.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "btn";
                b.innerText = opt;
                b.onclick = () => {
                    if(i === item.c) {
                        puan += 10;
                        document.getElementById('feedback').innerText = "Doğru! 🎉";
                        document.getElementById('feedback').style.color = "green";
                    } else {
                        document.getElementById('feedback').innerText = "Yanlış! ❌";
                        document.getElementById('feedback').style.color = "red";
                    }
                    document.getElementById('score').innerText = "Puan: " + puan;
                    index++;
                    setTimeout(render, 1000);
                };
                ops.appendChild(b);
            });
        }

        // Sayfa hazır olduğunda başlat
        window.onload = render;
    </script>
</body>
</html>

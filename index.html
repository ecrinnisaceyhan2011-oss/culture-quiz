<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culture Quiz | Test Your Knowledge 🥨</title>
    <style>
        :root {
            --primary: #880e4f;
            --secondary: #ad1457;
            --bg: #fff5f8;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            transition: background-color 1.5s ease; /* Renk geçişi efekti */
        }

        .quiz-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 90%; max-width: 480px;
            position: relative;
        }

        h1 { color: var(--primary); font-size: 28px; margin-bottom: 30px; letter-spacing: -1px; }

        .question { 
            font-size: 22px; color: #37474f; font-weight: 600; 
            margin-bottom: 30px; min-height: 70px;
            line-height: 1.4;
        }

        .options { display: grid; gap: 15px; }

        .btn {
            background: #ffffff; border: 2px solid #eceff1;
            padding: 16px; border-radius: 18px; cursor: pointer;
            font-weight: 600; color: #455a64; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover { 
            background: var(--primary); color: white; 
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(136, 14, 79, 0.2);
        }

        #feedback { 
            margin-top: 20px; font-weight: 700; font-size: 18px;
            height: 28px; transition: 0.3s;
        }

        #score-area {
            margin-top: 30px; padding-top: 25px;
            border-top: 1px solid #f0f0f0;
            display: flex; justify-content: space-between;
            color: #78909c; font-weight: 600;
        }

        .reset-btn { 
            margin-top: 25px; display: none; background: var(--primary); 
            color: white; border: none; padding: 14px 30px; 
            border-radius: 15px; cursor: pointer; font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="quiz-card">
        <h1>Genel Kültür Testi ✨</h1>
        
        <div id="game">
            <div class="question" id="q-text">Yükleniyor...</div>
            <div class="options" id="options"></div>
        </div>

        <div id="feedback"></div>

        <div id="score-area">
            <div id="score">Puan: 0</div>
            <div id="q-count">1 / 12</div>
        </div>
        
        <button id="reset" class="reset-btn" onclick="location.reload()">Tekrar Başlat 🔄</button>
    </div>

    <script>
        const data = [
            { q: "Türklerin kullandığı ilk takvim hangisidir?", a: ["Hicri Takvim", "12 Hayvanlı Türk Takvimi", "Rumi Takvim"], c: 1 },
            { q: "Sinekli Bakkal romanının yazarı kimdir?", a: ["Halide Edib Adıvar", "Reşat Nuri Güntekin", "Peyami Safa"], c: 0 },
            { q: "Mona Lisa tablosu hangi müzededir?", a: ["Prado Müzesi", "Louvre Müzesi", "Metropolitan"], c: 1 },
            { q: "En çok uydusu olan gezegen hangisidir?", a: ["Jüpiter", "Mars", "Satürn"], c: 2 },
            { q: "Türkiye'nin en büyük gölü hangisidir?", a: ["Tuz Gölü", "Beyşehir Gölü", "Van Gölü"], c: 2 },
            { q: "Nobel Edebiyat Ödülü alan ilk Türk yazar?", a: ["Orhan Pamuk", "Yaşar Kemal", "Aziz Nesin"], c: 0 },
            { q: "İstiklal Marşı hangi yıl kabul edildi?", a: ["1920", "1921", "1923"], c: 1 },
            { q: "Pisa Kulesi hangi ülkededir?", a: ["İtalya", "Fransa", "İspanya"], c: 0 },
            { q: "Eiffel Kulesi'nin mimarı kimdir?", a: ["Gustave Eiffel", "Le Corbusier", "Gaudi"], c: 0 },
            { q: "Hangi elementin simgesi 'Au'dur?", a: ["Gümüş", "Altın", "Bakır"], c: 1 },
            { q: "Olimpiyat halkalarında yeşil renk hangi kıtayı temsil eder?", a: ["Avrupa", "Asya", "Avustralya"], c: 2 },
            { q: "Cumhuriyet ne zaman ilan edildi?", a: ["29 Ekim 1923", "23 Nisan 1920", "30 Ağustos 1922"], c: 0 }
        ];

        // Soft arka plan renkleri
        const bgColors = ["#fff5f8", "#f0f4ff", "#f1f8e9", "#fffde7", "#f3e5f5", "#e0f2f1"];

        let index = 0;
        let puan = 0;

        function render() {
            const feedback = document.getElementById('feedback');
            const qCount = document.getElementById('q-count');
            
            // Arka plan rengini değiştir
            document.body.style.backgroundColor = bgColors[index % bgColors.length];

            if (index >= data.length) {
                document.getElementById('game').innerHTML = `
                    <h2 style="color: var(--primary)">Tebrikler! 🎉</h2>
                    <p style="font-size: 18px; color: #546e7a">Testi başarıyla tamamladınız.</p>
                `;
                document.getElementById('reset').style.display = "inline-block";
                feedback.innerText = "";
                qCount.innerText = `Sonuç: ${data.length}/${data.length}`;
                return;
            }

            const item = data[index];
            document.getElementById('q-text').innerText = item.q;
            qCount.innerText = `${index + 1} / ${data.length}`;
            
            const ops = document.getElementById('options');
            ops.innerHTML = "";
            
            item.a.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "btn";
                b.innerText = opt;
                b.onclick = () => {
                    const allBtns = document.querySelectorAll('.btn');
                    allBtns.forEach(btn => btn.style.pointerEvents = "none");

                    if(i === item.c) {
                        puan += 10;
                        feedback.innerText = "Harika! Doğru Cevap 🎉";
                        feedback.style.color = "#388e3c";
                        b.style.background = "#e8f5e9";
                        b.style.borderColor = "#4caf50";
                    } else {
                        feedback.innerText = "Yanlış Cevap! ❌";
                        feedback.style.color = "#d32f2f";
                        b.style.background = "#ffebee";
                        b.style.borderColor = "#f44336";
                    }

                    document.getElementById('score').innerText = "Puan: " + puan;
                    
                    setTimeout(() => {
                        feedback.innerText = "";
                        index++;
                        render();
                    }, 1200);
                };
                ops.appendChild(b);
            });
        }

        window.onload = render;
    </script>
</body>
</html>
